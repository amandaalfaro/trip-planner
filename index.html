<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }

    /* ── HEADER ── */
    header {
      background: #2d6a4f;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 1.4rem; cursor: pointer; }
    header nav { display: flex; gap: 1rem; align-items: center; }
    header nav button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.5);
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    header nav button:hover { background: rgba(255,255,255,0.15); }

    /* ── AUTH ── */
    #auth-section {
      max-width: 400px;
      margin: 5rem auto;
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      text-align: center;
    }
    #auth-section h2 { margin-bottom: 0.5rem; color: #2d6a4f; font-size: 1.6rem; }
    #auth-section p { color: #777; margin-bottom: 1.5rem; font-size: 0.95rem; }
    #google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      width: 100%;
      padding: 0.85rem;
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 500;
      transition: border-color 0.2s;
    }
    #google-btn:hover { border-color: #2d6a4f; }
    #auth-error { color: red; font-size: 0.85rem; margin-top: 0.75rem; }

    /* ── PAGES ── */
    .page { display: none; max-width: 960px; margin: 2rem auto; padding: 0 1.5rem 4rem; }
    .page.active { display: block; }

    /* ── DASHBOARD ── */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .dashboard-header h2 { font-size: 1.4rem; color: #2d6a4f; }

    .btn-primary {
      background: #2d6a4f;
      color: white;
      border: none;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .btn-primary:hover { background: #245c43; }
    .btn-danger { background: #fee2e2; color: #b91c1c; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }

    /* Status filter tabs */
    .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .filter-tab {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      font-size: 0.875rem;
      color: #555;
    }
    .filter-tab.active { background: #2d6a4f; color: white; border-color: #2d6a4f; }

    /* Trip cards */
    #trips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }
    .trip-card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .trip-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    .trip-card-cover {
      height: 140px;
      background: linear-gradient(135deg, #2d6a4f, #52b788);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
      overflow: hidden;
    }
    .trip-card-cover img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .trip-card-cover .cover-emoji { position: relative; z-index: 1; }
    .trip-status-badge {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      z-index: 2;
    }
    .status-upcoming { background: #dbeafe; color: #1d4ed8; }
    .status-past { background: #dcfce7; color: #15803d; }
    .status-in-progress { background: #fef3c7; color: #92400e; }
    .trip-card-body { padding: 1rem 1.2rem 1.2rem; }
    .trip-card-body h3 { font-size: 1.1rem; margin-bottom: 0.3rem; }
    .trip-card-body .meta { font-size: 0.82rem; color: #777; margin-bottom: 0.8rem; }
    .trip-card-body .card-actions { display: flex; gap: 0.5rem; }
    .trip-card-body .card-actions button { flex: 1; padding: 0.45rem; border-radius: 6px; font-size: 0.85rem; }

    #no-trips { text-align: center; color: #aaa; padding: 3rem 0; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      margin: 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h3 { margin-bottom: 1.2rem; color: #2d6a4f; }
    .modal input, .modal select, .modal textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      margin-bottom: 0.85rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 0.5rem; }
    .btn-cancel { background: #f3f4f6; border: none; padding: 0.65rem 1.2rem; border-radius: 8px; cursor: pointer; }

    /* ── TRIP DETAIL ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #2d6a4f;
      background: none;
      border: none;
      font-size: 0.95rem;
      cursor: pointer;
      margin-bottom: 1.2rem;
      padding: 0;
      font-weight: 500;
    }
    .back-btn:hover { text-decoration: underline; }

    .trip-hero {
      background: linear-gradient(135deg, #2d6a4f, #52b788);
      border-radius: 16px;
      padding: 2rem;
      color: white;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .trip-hero-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.35;
    }
    .trip-hero-content { position: relative; z-index: 1; }
    .trip-hero h2 { font-size: 1.8rem; margin-bottom: 0.3rem; }
    .trip-hero .hero-meta { font-size: 0.9rem; opacity: 0.85; margin-bottom: 0.75rem; }
    .trip-hero .hero-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-light {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      color: white;
      padding: 0.45rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      backdrop-filter: blur(4px);
    }
    .btn-light:hover { background: rgba(255,255,255,0.35); }

    /* Detail sections */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 1.2rem;
    }
    @media (max-width: 640px) { .detail-grid { grid-template-columns: 1fr; } }

    .detail-section {
      background: white;
      border-radius: 14px;
      padding: 1.4rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .detail-section.full-width { grid-column: 1 / -1; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .section-header h3 { font-size: 1rem; color: #2d6a4f; display: flex; align-items: center; gap: 0.4rem; }
    .section-header button { font-size: 0.8rem; padding: 0.3rem 0.8rem; }

    .item-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0.7rem 0.9rem;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 0.875rem;
      gap: 0.5rem;
    }
    .item-row .item-info { flex: 1; }
    .item-row .item-title { font-weight: 600; margin-bottom: 0.15rem; }
    .item-row .item-sub { color: #777; font-size: 0.8rem; }
    .item-row .item-delete { color: #b91c1c; background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0 0.2rem; flex-shrink: 0; }
    .empty-state { color: #bbb; font-size: 0.875rem; text-align: center; padding: 1rem 0; }

    /* Images */
    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.75rem;
    }
    .img-thumb {
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      background: #f3f4f6;
    }
    .img-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .img-thumb .img-delete {
      position: absolute;
      top: 0.3rem;
      right: 0.3rem;
      background: rgba(0,0,0,0.55);
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .upload-btn-wrap { margin-top: 0.75rem; }
    .upload-label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #f3f4f6;
      border: 2px dashed #d1d5db;
      border-radius: 10px;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      font-size: 0.875rem;
      color: #555;
      transition: border-color 0.2s;
    }
    .upload-label:hover { border-color: #2d6a4f; color: #2d6a4f; }
    #image-upload { display: none; }

    /* Notes */
    .notes-area {
      width: 100%;
      min-height: 100px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
      color: #333;
    }
    .notes-save { margin-top: 0.5rem; font-size: 0.85rem; padding: 0.4rem 1rem; }
  </style>
</head>
<body>

<header>
  <h1 id="home-link">🌍 Trip Planner</h1>
  <nav>
    <span id="user-name" style="font-size:0.9rem;opacity:0.85;"></span>
    <button id="logout-btn" style="display:none">Log out</button>
  </nav>
</header>

<!-- AUTH -->
<div id="auth-section">
  <h2>🌍 Trip Planner</h2>
  <p>Plan every trip in one place</p>
  <button id="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" /> Sign in with Google
  </button>
  <p id="auth-error"></p>
</div>

<!-- DASHBOARD PAGE -->
<div id="page-dashboard" class="page">
  <div class="dashboard-header">
    <h2>My Trips</h2>
    <button class="btn-primary" id="new-trip-btn">+ New Trip</button>
  </div>
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="upcoming">Upcoming</button>
    <button class="filter-tab" data-filter="in-progress">In Progress</button>
    <button class="filter-tab" data-filter="past">Past</button>
  </div>
  <div id="trips-grid"></div>
  <p id="no-trips" style="display:none" class="empty-state">No trips yet — add one!</p>
</div>

<!-- TRIP DETAIL PAGE -->
<div id="page-detail" class="page">
  <button class="back-btn" id="back-btn">← Back to trips</button>

  <div class="trip-hero" id="trip-hero">
    <img class="trip-hero-bg" id="hero-bg" src="" style="display:none" />
    <div class="trip-hero-content">
      <h2 id="detail-name"></h2>
      <div class="hero-meta" id="detail-meta"></div>
      <div class="hero-actions">
        <button class="btn-light" id="edit-trip-btn">✏️ Edit Trip</button>
        <button class="btn-light btn-danger-light" id="delete-trip-btn" style="background:rgba(220,38,38,0.3);border-color:rgba(220,38,38,0.5);">🗑 Delete Trip</button>
      </div>
    </div>
  </div>

  <div class="detail-grid">

    <!-- Flights -->
    <div class="detail-section">
      <div class="section-header">
        <h3>✈️ Flights</h3>
        <button class="btn-primary" id="add-flight-btn">+ Add</button>
      </div>
      <div class="item-list" id="flights-list"></div>
    </div>

    <!-- Hotels -->
    <div class="detail-section">
      <div class="section-header">
        <h3>🏨 Hotels</h3>
        <button class="btn-primary" id="add-hotel-btn">+ Add</button>
      </div>
      <div class="item-list" id="hotels-list"></div>
    </div>

    <!-- Activities -->
    <div class="detail-section">
      <div class="section-header">
        <h3>🎯 Activities</h3>
        <button class="btn-primary" id="add-activity-btn">+ Add</button>
      </div>
      <div class="item-list" id="activities-list"></div>
    </div>

    <!-- Notes -->
    <div class="detail-section">
      <div class="section-header">
        <h3>📝 Notes</h3>
      </div>
      <textarea class="notes-area" id="notes-area" placeholder="Packing list, reminders, ideas..."></textarea>
      <button class="btn-primary notes-save" id="save-notes-btn">Save Notes</button>
    </div>

    <!-- Photos -->
    <div class="detail-section full-width">
      <div class="section-header">
        <h3>📸 Showcase Photos</h3>
      </div>
      <div class="images-grid" id="images-grid"></div>
      <div class="upload-btn-wrap">
        <label class="upload-label" for="image-upload">📁 Upload Photos</label>
        <input type="file" id="image-upload" accept="image/*" multiple />
      </div>
    </div>

  </div>
</div>

<!-- MODAL: New / Edit Trip -->
<div class="modal-overlay" id="trip-modal">
  <div class="modal">
    <h3 id="modal-title">New Trip</h3>
    <input type="text" id="modal-name" placeholder="Trip name (e.g. Yellowstone 2026)" />
    <input type="text" id="modal-destination" placeholder="Destination" />
    <select id="modal-status">
      <option value="upcoming">Upcoming</option>
      <option value="in-progress">In Progress</option>
      <option value="past">Past</option>
    </select>
    <input type="date" id="modal-start" />
    <input type="date" id="modal-end" />
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-save">Save Trip</button>
    </div>
  </div>
</div>

<!-- MODAL: Flight -->
<div class="modal-overlay" id="flight-modal">
  <div class="modal">
    <h3>Add Flight</h3>
    <input type="text" id="flight-airline" placeholder="Airline & flight number (e.g. Delta DL123)" />
    <input type="text" id="flight-from" placeholder="From (e.g. BTR)" />
    <input type="text" id="flight-to" placeholder="To (e.g. JFK)" />
    <input type="datetime-local" id="flight-depart" />
    <input type="datetime-local" id="flight-arrive" />
    <input type="text" id="flight-confirmation" placeholder="Confirmation number" />
    <div class="modal-actions">
      <button class="btn-cancel" id="flight-cancel">Cancel</button>
      <button class="btn-primary" id="flight-save">Save Flight</button>
    </div>
  </div>
</div>

<!-- MODAL: Hotel -->
<div class="modal-overlay" id="hotel-modal">
  <div class="modal">
    <h3>Add Hotel</h3>
    <input type="text" id="hotel-name" placeholder="Hotel name" />
    <input type="text" id="hotel-address" placeholder="Address" />
    <input type="date" id="hotel-checkin" placeholder="Check-in" />
    <input type="date" id="hotel-checkout" placeholder="Check-out" />
    <input type="text" id="hotel-confirmation" placeholder="Confirmation number" />
    <div class="modal-actions">
      <button class="btn-cancel" id="hotel-cancel">Cancel</button>
      <button class="btn-primary" id="hotel-save">Save Hotel</button>
    </div>
  </div>
</div>

<!-- MODAL: Activity -->
<div class="modal-overlay" id="activity-modal">
  <div class="modal">
    <h3>Add Activity</h3>
    <input type="text" id="activity-name" placeholder="Activity name (e.g. Old Faithful tour)" />
    <input type="date" id="activity-date" />
    <input type="text" id="activity-location" placeholder="Location" />
    <textarea id="activity-notes" placeholder="Notes (optional)"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="activity-cancel">Cancel</button>
      <button class="btn-primary" id="activity-save">Save Activity</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, getDoc, setDoc, updateDoc, deleteDoc, doc, query, where }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAiv9ko9eelpCvxWhNZyuijktzto9GcUAQ",
    authDomain: "trip-planner-aa.firebaseapp.com",
    projectId: "trip-planner-aa",
    storageBucket: "trip-planner-aa.firebasestorage.app",
    messagingSenderId: "954996217281",
    appId: "1:954996217281:web:63419f9e6f1835681dcb40"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentTripId = null;
  let editingTripId = null;
  let activeFilter = 'all';

  // ── ROUTING ──
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id)?.classList.add('active');
  }

  // ── AUTH ──
  const authSection = document.getElementById('auth-section');
  const logoutBtn = document.getElementById('logout-btn');
  const userNameEl = document.getElementById('user-name');

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      authSection.style.display = 'none';
      logoutBtn.style.display = 'block';
      userNameEl.textContent = user.displayName?.split(' ')[0] || '';
      showPage('page-dashboard');
      loadTrips();
    } else {
      currentUser = null;
      authSection.style.display = 'block';
      logoutBtn.style.display = 'none';
      showPage(null);
    }
  });

  document.getElementById('google-btn').addEventListener('click', async () => {
    document.getElementById('auth-error').textContent = '';
    try {
      await signInWithPopup(auth, new GoogleAuthProvider());
    } catch {
      document.getElementById('auth-error').textContent = 'Sign-in failed. Please try again.';
    }
  });

  logoutBtn.addEventListener('click', () => signOut(auth));
  document.getElementById('home-link').addEventListener('click', () => {
    showPage('page-dashboard');
    loadTrips();
  });
  document.getElementById('back-btn').addEventListener('click', () => {
    showPage('page-dashboard');
    loadTrips();
  });

  // ── FILTER TABS ──
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFilter = tab.dataset.filter;
      loadTrips();
    });
  });

  // ── DASHBOARD ──
  async function loadTrips() {
    const grid = document.getElementById('trips-grid');
    const noTrips = document.getElementById('no-trips');
    grid.innerHTML = '';
    const q = query(collection(db, 'trips'), where('uid', '==', currentUser.uid));
    const snap = await getDocs(q);
    let trips = [];
    snap.forEach(d => trips.push({ id: d.id, ...d.data() }));
    if (activeFilter !== 'all') trips = trips.filter(t => t.status === activeFilter);
    trips.sort((a, b) => (a.start || '') > (b.start || '') ? 1 : -1);
    if (!trips.length) { noTrips.style.display = 'block'; return; }
    noTrips.style.display = 'none';
    trips.forEach(trip => grid.appendChild(makeTripCard(trip)));
  }

  function statusLabel(s) {
    if (s === 'past') return { label: 'Past', cls: 'status-past' };
    if (s === 'in-progress') return { label: 'In Progress', cls: 'status-in-progress' };
    return { label: 'Upcoming', cls: 'status-upcoming' };
  }

  function makeTripCard(trip) {
    const { label, cls } = statusLabel(trip.status);
    const card = document.createElement('div');
    card.className = 'trip-card';
    const coverImg = trip.coverImage
      ? `<img src="${trip.coverImage}" />`
      : '';
    card.innerHTML = `
      <div class="trip-card-cover">
        ${coverImg}
        <span class="cover-emoji">${trip.status === 'past' ? '✅' : trip.status === 'in-progress' ? '🗺️' : '✈️'}</span>
        <span class="trip-status-badge ${cls}">${label}</span>
      </div>
      <div class="trip-card-body">
        <h3>${trip.name}</h3>
        <div class="meta">📍 ${trip.destination} &nbsp;·&nbsp; 📅 ${trip.start || '—'} → ${trip.end || '—'}</div>
        <div class="card-actions">
          <button class="btn-primary btn-view">Open</button>
          <button class="btn-danger btn-del">Delete</button>
        </div>
      </div>
    `;
    card.querySelector('.btn-view').addEventListener('click', e => { e.stopPropagation(); openTrip(trip.id); });
    card.querySelector('.btn-del').addEventListener('click', e => { e.stopPropagation(); deleteTrip(trip.id); });
    card.addEventListener('click', () => openTrip(trip.id));
    return card;
  }

  // ── TRIP MODAL ──
  document.getElementById('new-trip-btn').addEventListener('click', () => openTripModal());
  document.getElementById('modal-cancel').addEventListener('click', () => closeTripModal());
  document.getElementById('modal-save').addEventListener('click', saveTripModal);

  function openTripModal(trip = null) {
    editingTripId = trip?.id || null;
    document.getElementById('modal-title').textContent = trip ? 'Edit Trip' : 'New Trip';
    document.getElementById('modal-name').value = trip?.name || '';
    document.getElementById('modal-destination').value = trip?.destination || '';
    document.getElementById('modal-status').value = trip?.status || 'upcoming';
    document.getElementById('modal-start').value = trip?.start || '';
    document.getElementById('modal-end').value = trip?.end || '';
    document.getElementById('trip-modal').classList.add('open');
  }

  function closeTripModal() {
    document.getElementById('trip-modal').classList.remove('open');
    editingTripId = null;
  }

  async function saveTripModal() {
    const data = {
      uid: currentUser.uid,
      name: document.getElementById('modal-name').value.trim(),
      destination: document.getElementById('modal-destination').value.trim(),
      status: document.getElementById('modal-status').value,
      start: document.getElementById('modal-start').value,
      end: document.getElementById('modal-end').value,
    };
    if (!data.name || !data.destination) return alert('Please enter a name and destination.');
    if (editingTripId) {
      await updateDoc(doc(db, 'trips', editingTripId), data);
    } else {
      data.createdAt = Date.now();
      await addDoc(collection(db, 'trips'), data);
    }
    closeTripModal();
    if (editingTripId && currentTripId === editingTripId) openTrip(editingTripId);
    else loadTrips();
  }

  async function deleteTrip(id) {
    if (!confirm('Delete this trip and all its details?')) return;
    await deleteDoc(doc(db, 'trips', id));
    showPage('page-dashboard');
    loadTrips();
  }

  // ── TRIP DETAIL ──
  async function openTrip(id) {
    currentTripId = id;
    showPage('page-detail');
    const snap = await getDoc(doc(db, 'trips', id));
    const trip = { id: snap.id, ...snap.data() };
    document.getElementById('detail-name').textContent = trip.name;
    document.getElementById('detail-meta').textContent =
      `📍 ${trip.destination}  ·  📅 ${trip.start || '—'} → ${trip.end || '—'}`;
    const heroBg = document.getElementById('hero-bg');
    if (trip.coverImage) { heroBg.src = trip.coverImage; heroBg.style.display = 'block'; }
    else heroBg.style.display = 'none';
    document.getElementById('notes-area').value = trip.notes || '';
    loadSubcollection('flights', renderFlight);
    loadSubcollection('hotels', renderHotel);
    loadSubcollection('activities', renderActivity);
    loadImages();
  }

  document.getElementById('edit-trip-btn').addEventListener('click', async () => {
    const snap = await getDoc(doc(db, 'trips', currentTripId));
    openTripModal({ id: snap.id, ...snap.data() });
  });
  document.getElementById('delete-trip-btn').addEventListener('click', () => deleteTrip(currentTripId));

  // ── SUBCOLLECTIONS ──
  async function loadSubcollection(type, renderFn) {
    const listEl = document.getElementById(`${type}-list`);
    listEl.innerHTML = '';
    const snap = await getDocs(collection(db, 'trips', currentTripId, type));
    if (snap.empty) { listEl.innerHTML = `<p class="empty-state">No ${type} added yet.</p>`; return; }
    snap.forEach(d => listEl.appendChild(renderFn(d.id, d.data())));
  }

  function makeItemRow(id, title, sub, type) {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <div class="item-info">
        <div class="item-title">${title}</div>
        ${sub ? `<div class="item-sub">${sub}</div>` : ''}
      </div>
      <button class="item-delete" title="Delete">✕</button>
    `;
    row.querySelector('.item-delete').addEventListener('click', async () => {
      await deleteDoc(doc(db, 'trips', currentTripId, type, id));
      loadSubcollection(type, type === 'flights' ? renderFlight : type === 'hotels' ? renderHotel : renderActivity);
    });
    return row;
  }

  function renderFlight(id, d) {
    return makeItemRow(id, `${d.airline} · ${d.from} → ${d.to}`, `Departs: ${d.depart || '—'} · Conf: ${d.confirmation || '—'}`, 'flights');
  }
  function renderHotel(id, d) {
    return makeItemRow(id, d.name, `${d.checkin || '—'} → ${d.checkout || '—'} · Conf: ${d.confirmation || '—'}`, 'hotels');
  }
  function renderActivity(id, d) {
    return makeItemRow(id, d.name, `${d.date || '—'} · ${d.location || ''}`, 'activities');
  }

  // Flights modal
  document.getElementById('add-flight-btn').addEventListener('click', () => document.getElementById('flight-modal').classList.add('open'));
  document.getElementById('flight-cancel').addEventListener('click', () => document.getElementById('flight-modal').classList.remove('open'));
  document.getElementById('flight-save').addEventListener('click', async () => {
    const data = {
      airline: document.getElementById('flight-airline').value.trim(),
      from: document.getElementById('flight-from').value.trim(),
      to: document.getElementById('flight-to').value.trim(),
      depart: document.getElementById('flight-depart').value,
      arrive: document.getElementById('flight-arrive').value,
      confirmation: document.getElementById('flight-confirmation').value.trim(),
    };
    if (!data.airline) return alert('Please enter airline info.');
    await addDoc(collection(db, 'trips', currentTripId, 'flights'), data);
    document.getElementById('flight-modal').classList.remove('open');
    document.getElementById('flight-airline').value = '';
    document.getElementById('flight-from').value = '';
    document.getElementById('flight-to').value = '';
    document.getElementById('flight-depart').value = '';
    document.getElementById('flight-arrive').value = '';
    document.getElementById('flight-confirmation').value = '';
    loadSubcollection('flights', renderFlight);
  });

  // Hotels modal
  document.getElementById('add-hotel-btn').addEventListener('click', () => document.getElementById('hotel-modal').classList.add('open'));
  document.getElementById('hotel-cancel').addEventListener('click', () => document.getElementById('hotel-modal').classList.remove('open'));
  document.getElementById('hotel-save').addEventListener('click', async () => {
    const data = {
      name: document.getElementById('hotel-name').value.trim(),
      address: document.getElementById('hotel-address').value.trim(),
      checkin: document.getElementById('hotel-checkin').value,
      checkout: document.getElementById('hotel-checkout').value,
      confirmation: document.getElementById('hotel-confirmation').value.trim(),
    };
    if (!data.name) return alert('Please enter hotel name.');
    await addDoc(collection(db, 'trips', currentTripId, 'hotels'), data);
    document.getElementById('hotel-modal').classList.remove('open');
    ['hotel-name','hotel-address','hotel-checkin','hotel-checkout','hotel-confirmation'].forEach(id => document.getElementById(id).value = '');
    loadSubcollection('hotels', renderHotel);
  });

  // Activities modal
  document.getElementById('add-activity-btn').addEventListener('click', () => document.getElementById('activity-modal').classList.add('open'));
  document.getElementById('activity-cancel').addEventListener('click', () => document.getElementById('activity-modal').classList.remove('open'));
  document.getElementById('activity-save').addEventListener('click', async () => {
    const data = {
      name: document.getElementById('activity-name').value.trim(),
      date: document.getElementById('activity-date').value,
      location: document.getElementById('activity-location').value.trim(),
      notes: document.getElementById('activity-notes').value.trim(),
    };
    if (!data.name) return alert('Please enter activity name.');
    await addDoc(collection(db, 'trips', currentTripId, 'activities'), data);
    document.getElementById('activity-modal').classList.remove('open');
    ['activity-name','activity-date','activity-location','activity-notes'].forEach(id => document.getElementById(id).value = '');
    loadSubcollection('activities', renderActivity);
  });

  // ── NOTES ──
  document.getElementById('save-notes-btn').addEventListener('click', async () => {
    const notes = document.getElementById('notes-area').value;
    await updateDoc(doc(db, 'trips', currentTripId), { notes });
    document.getElementById('save-notes-btn').textContent = 'Saved ✓';
    setTimeout(() => document.getElementById('save-notes-btn').textContent = 'Save Notes', 1500);
  });

  // ── IMAGES ──
  async function loadImages() {
    const grid = document.getElementById('images-grid');
    grid.innerHTML = '';
    const snap = await getDocs(collection(db, 'trips', currentTripId, 'images'));
    snap.forEach(d => grid.appendChild(makeImageThumb(d.id, d.data().url)));
  }

  function makeImageThumb(id, url) {
    const wrap = document.createElement('div');
    wrap.className = 'img-thumb';
    wrap.innerHTML = `<img src="${url}" /><button class="img-delete" title="Remove">✕</button>`;
    wrap.querySelector('.img-delete').addEventListener('click', async () => {
      await deleteDoc(doc(db, 'trips', currentTripId, 'images', id));
      loadImages();
    });
    return wrap;
  }

  document.getElementById('image-upload').addEventListener('change', async e => {
    const files = Array.from(e.target.files);
    for (const file of files) {
      const base64 = await toBase64(file);
      const imgDoc = await addDoc(collection(db, 'trips', currentTripId, 'images'), { url: base64, createdAt: Date.now() });
      // Use first uploaded image as cover
      const tripSnap = await getDoc(doc(db, 'trips', currentTripId));
      if (!tripSnap.data().coverImage) {
        await updateDoc(doc(db, 'trips', currentTripId), { coverImage: base64 });
      }
    }
    e.target.value = '';
    loadImages();
    // Refresh hero
    const tripSnap = await getDoc(doc(db, 'trips', currentTripId));
    const cover = tripSnap.data().coverImage;
    const heroBg = document.getElementById('hero-bg');
    if (cover) { heroBg.src = cover; heroBg.style.display = 'block'; }
  });

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
  });
</script>

</body>
</html>
